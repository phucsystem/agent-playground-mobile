<!--
  Screen: S-08 Conversation Info
  CJX Stage: Usage
  FR Mapping: FR-10 (group info), FR-12 (shared files)
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S-08 Conversation Info</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="components.css">
</head>
<body class="cjx-usage">
  <div class="mobile-frame">
    <!-- Status Bar -->
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-bar-right">
        <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="3" width="3" height="9" rx="1" fill="#1A1A1A"/><rect x="4" y="2" width="3" height="10" rx="1" fill="#1A1A1A"/><rect x="8" y="0" width="3" height="12" rx="1" fill="#1A1A1A"/><rect x="12" y="0" width="3" height="12" rx="1" fill="#1A1A1A"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 2C5.5 2 3.2 3 1.5 4.7L0 3.2C2.1 1.2 4.9 0 8 0s5.9 1.2 8 3.2l-1.5 1.5C12.8 3 10.5 2 8 2z" fill="#1A1A1A"/><path d="M8 6C6.4 6 4.9 6.6 3.8 7.7L2.3 6.2C3.8 4.8 5.8 4 8 4s4.2.8 5.7 2.2l-1.5 1.5C11.1 6.6 9.6 6 8 6z" fill="#1A1A1A"/><circle cx="8" cy="10" r="2" fill="#1A1A1A"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="21" height="10" rx="2" stroke="#1A1A1A" stroke-width="1" fill="none"/><rect x="22" y="4" width="2" height="4" rx="1" fill="#1A1A1A"/><rect x="1.5" y="2.5" width="16" height="7" rx="1" fill="#1A1A1A"/></svg>
      </div>
    </div>

    <div class="app-layout">
      <nav class="sidebar hide-mobile"></nav>

      <!-- Header -->
      <div class="screen-header">
        <button class="header-back" onclick="history.back()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <span class="text-h3" style="flex: 1;">Info</span>
      </div>

      <main class="main-content" data-cjx-entrance>

        <!-- Group Avatar + Name (centered) -->
        <div class="info-header-section">
          <div class="avatar avatar-lg avatar-orange">QA</div>
          <h2 class="text-h2">QA Testing</h2>
          <span class="text-body-sm color-secondary">5 members</span>
        </div>

        <!-- Members Section -->
        <div class="info-section">
          <div class="info-section-title">Members</div>

          <!-- Member: Admin (you) -->
          <div class="member-item">
            <div class="avatar avatar-sm avatar-purple" style="position: relative;">
              PH
              <span class="presence-dot"></span>
            </div>
            <div class="member-info">
              <span class="member-name">phuc <span class="text-caption color-secondary">(you)</span></span>
              <span class="member-status presence-text online"><span class="dot"></span> Online</span>
            </div>
            <span class="role-badge admin">Admin</span>
          </div>

          <!-- Member: Alice -->
          <div class="member-item">
            <div class="avatar avatar-sm avatar-green" style="position: relative;">
              AL
              <span class="presence-dot"></span>
            </div>
            <div class="member-info">
              <span class="member-name">Alice</span>
              <span class="member-status presence-text online"><span class="dot"></span> Online</span>
            </div>
            <span class="role-badge user-role">User</span>
          </div>

          <!-- Member: Bob -->
          <div class="member-item">
            <div class="avatar avatar-sm avatar-red">BO</div>
            <div class="member-info">
              <span class="member-name">Bob</span>
              <span class="member-status presence-text offline"><span class="dot"></span> Offline</span>
            </div>
            <span class="role-badge user-role">User</span>
          </div>

          <!-- Member: Agent-1 -->
          <div class="member-item">
            <div class="avatar avatar-sm avatar-blue" style="position: relative;">
              A1
              <span class="bot-badge"><svg viewBox="0 0 10 10"><circle cx="5" cy="3" r="2" fill="white"/><rect x="2" y="5" width="6" height="3" rx="1" fill="white"/></svg></span>
            </div>
            <div class="member-info">
              <span class="member-name">Agent-1</span>
              <span class="member-status presence-text online"><span class="dot"></span> Online</span>
            </div>
            <span class="role-badge agent">Agent</span>
          </div>

          <!-- Member: Agent-2 -->
          <div class="member-item">
            <div class="avatar avatar-sm avatar-teal" style="position: relative;">
              A2
              <span class="bot-badge"><svg viewBox="0 0 10 10"><circle cx="5" cy="3" r="2" fill="white"/><rect x="2" y="5" width="6" height="3" rx="1" fill="white"/></svg></span>
            </div>
            <div class="member-info">
              <span class="member-name">Agent-2</span>
              <span class="member-status presence-text offline"><span class="dot"></span> Offline</span>
            </div>
            <span class="role-badge agent">Agent</span>
          </div>
        </div>

        <!-- Shared Files Section -->
        <div class="info-section">
          <div class="info-section-title">Shared Files</div>

          <div class="member-item" style="cursor: pointer;" onclick="window.location.href='s07-image-viewer.html'">
            <div style="width: 40px; height: 40px; border-radius: var(--radius-sm); background: var(--color-surface); display: flex; align-items: center; justify-content: center;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-secondary)" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            </div>
            <div class="member-info">
              <span class="member-name" style="font-size: 14px;">test-results-chart.png</span>
              <span class="member-status">245 KB &middot; Mar 17</span>
            </div>
          </div>

          <div class="member-item" style="cursor: pointer;">
            <div style="width: 40px; height: 40px; border-radius: var(--radius-sm); background: var(--color-surface); display: flex; align-items: center; justify-content: center;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-secondary)" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <div class="member-info">
              <span class="member-name" style="font-size: 14px;">auth-flow-spec.pdf</span>
              <span class="member-status">1.2 MB &middot; Mar 16</span>
            </div>
          </div>

          <div class="member-item" style="cursor: pointer;">
            <div style="width: 40px; height: 40px; border-radius: var(--radius-sm); background: var(--color-surface); display: flex; align-items: center; justify-content: center;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-secondary)" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            </div>
            <div class="member-info">
              <span class="member-name" style="font-size: 14px;">screenshot-error.png</span>
              <span class="member-status">189 KB &middot; Mar 15</span>
            </div>
          </div>
        </div>

      </main>
    </div>
  </div>
  <script src="interactions.js"></script>
</body>
</html>
