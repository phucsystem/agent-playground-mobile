<!--
  Screen: S-01 Login
  CJX Stage: Onboarding
  FR Mapping: FR-01, FR-02
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S-01 Login</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="components.css">
</head>
<body class="cjx-onboarding">
  <div class="mobile-frame">
    <!-- Status Bar -->
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-bar-right">
        <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="3" width="3" height="9" rx="1" fill="#1A1A1A"/><rect x="4" y="2" width="3" height="10" rx="1" fill="#1A1A1A"/><rect x="8" y="0" width="3" height="12" rx="1" fill="#1A1A1A"/><rect x="12" y="0" width="3" height="12" rx="1" fill="#1A1A1A"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 2C5.5 2 3.2 3 1.5 4.7L0 3.2C2.1 1.2 4.9 0 8 0s5.9 1.2 8 3.2l-1.5 1.5C12.8 3 10.5 2 8 2z" fill="#1A1A1A"/><path d="M8 6C6.4 6 4.9 6.6 3.8 7.7L2.3 6.2C3.8 4.8 5.8 4 8 4s4.2.8 5.7 2.2l-1.5 1.5C11.1 6.6 9.6 6 8 6z" fill="#1A1A1A"/><circle cx="8" cy="10" r="2" fill="#1A1A1A"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="21" height="10" rx="2" stroke="#1A1A1A" stroke-width="1" fill="none"/><rect x="22" y="4" width="2" height="4" rx="1" fill="#1A1A1A"/><rect x="1.5" y="2.5" width="16" height="7" rx="1" fill="#1A1A1A"/></svg>
      </div>
    </div>

    <div class="app-layout">
      <nav class="sidebar hide-mobile"></nav>
      <main class="main-content" data-cjx-entrance style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: var(--space-xl);">

        <!-- App Logo + Name (top 30%) -->
        <div style="text-align: center; margin-bottom: var(--space-2xl);">
          <svg width="64" height="64" viewBox="0 0 64 64" style="margin-bottom: var(--space-lg);">
            <rect width="64" height="64" rx="16" fill="var(--color-primary)"/>
            <path d="M20 22h24v4H20zM20 30h18v4H20zM20 38h22v4H20z" fill="white" opacity="0.9"/>
            <circle cx="46" cy="40" r="6" fill="white"/>
            <path d="M44 40l2 2 4-4" stroke="var(--color-primary)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <h1 class="text-h1" style="margin-bottom: var(--space-sm);">Agent Playground</h1>
          <p class="text-body-sm color-secondary">Enter your access token to continue</p>
        </div>

        <!-- Login Form -->
        <form class="login-form" style="width: 100%; max-width: 340px;">

          <!-- Token Input -->
          <div class="form-field">
            <div style="position: relative;">
              <input
                type="password"
                class="form-input token-input font-mono"
                placeholder="Paste your 64-character token"
                style="padding-right: 56px;"
              >
              <button type="button" class="reveal-toggle" style="
                position: absolute;
                right: var(--space-md);
                top: 50%;
                transform: translateY(-50%);
                background: none;
                border: none;
                font-size: 13px;
                color: var(--color-primary);
                cursor: pointer;
                font-weight: 500;
              ">Show</button>
            </div>
            <!-- Paste hint (hidden by default) -->
            <p class="paste-hint text-caption color-primary" style="display: none; margin-top: var(--space-xs);">
              64-character token detected in clipboard. Tap to paste.
            </p>
            <!-- Error message -->
            <p class="error-text text-caption color-error" style="display: none; margin-top: var(--space-sm);">
              Invalid token. Please enter a valid 64-character token.
            </p>
          </div>

          <!-- Sign In Button -->
          <button type="submit" class="btn-primary" style="margin-top: var(--space-lg);">
            Sign In
          </button>

        </form>

      </main>
    </div>
  </div>
  <script src="interactions.js"></script>
</body>
</html>
