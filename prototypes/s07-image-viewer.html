<!--
  Screen: S-07 Image Viewer
  CJX Stage: Usage
  FR Mapping: FR-13
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S-07 Image Viewer</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="components.css">
</head>
<body class="cjx-usage">
  <div class="mobile-frame" style="background: #000000;">

    <div class="app-layout" style="background: #000000; position: relative;">

      <!-- Header (toggleable) -->
      <div class="image-viewer-header">
        <button onclick="window.location.href='s03-dm-chat.html'">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
        <div style="display: flex; gap: var(--space-md);">
          <button>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          </button>
          <button>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
        </div>
      </div>

      <!-- Image Content (centered, fullscreen) -->
      <div class="image-viewer-content" data-cjx-entrance>
        <!-- Placeholder: a sample chart SVG as a shared image -->
        <svg viewBox="0 0 360 240" style="max-width: 100%; background: white; border-radius: var(--radius-sm);">
          <!-- Chart title -->
          <text x="180" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">Test Results Over Time</text>
          <!-- Grid -->
          <g stroke="#E5E7EB" stroke-width="1">
            <line x1="40" y1="40" x2="340" y2="40" stroke-dasharray="4"/>
            <line x1="40" y1="80" x2="340" y2="80" stroke-dasharray="4"/>
            <line x1="40" y1="120" x2="340" y2="120" stroke-dasharray="4"/>
            <line x1="40" y1="160" x2="340" y2="160" stroke-dasharray="4"/>
            <line x1="40" y1="200" x2="340" y2="200"/>
          </g>
          <!-- Y-axis labels -->
          <g font-family="Inter, sans-serif" font-size="10" fill="#6B7280" text-anchor="end">
            <text x="36" y="44">100</text>
            <text x="36" y="84">75</text>
            <text x="36" y="124">50</text>
            <text x="36" y="164">25</text>
            <text x="36" y="204">0</text>
          </g>
          <!-- X-axis labels -->
          <g font-family="Inter, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">
            <text x="80" y="218">Mon</text>
            <text x="140" y="218">Tue</text>
            <text x="200" y="218">Wed</text>
            <text x="260" y="218">Thu</text>
            <text x="320" y="218">Fri</text>
          </g>
          <!-- Passed line (green) -->
          <polyline fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
            points="80,72 140,56 200,48 260,52 320,44"/>
          <g fill="#10B981">
            <circle cx="80" cy="72" r="4"/>
            <circle cx="140" cy="56" r="4"/>
            <circle cx="200" cy="48" r="4"/>
            <circle cx="260" cy="52" r="4"/>
            <circle cx="320" cy="44" r="4"/>
          </g>
          <!-- Failed line (red) -->
          <polyline fill="none" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
            points="80,176 140,184 200,188 260,180 320,192"/>
          <g fill="#EF4444">
            <circle cx="80" cy="176" r="4"/>
            <circle cx="140" cy="184" r="4"/>
            <circle cx="200" cy="188" r="4"/>
            <circle cx="260" cy="180" r="4"/>
            <circle cx="320" cy="192" r="4"/>
          </g>
          <!-- Legend -->
          <g font-family="Inter, sans-serif" font-size="10">
            <circle cx="120" cy="234" r="4" fill="#10B981"/>
            <text x="128" y="237" fill="#6B7280">Passed</text>
            <circle cx="180" cy="234" r="4" fill="#EF4444"/>
            <text x="188" y="237" fill="#6B7280">Failed</text>
          </g>
        </svg>
      </div>

    </div>
  </div>
  <script src="interactions.js"></script>
</body>
</html>
